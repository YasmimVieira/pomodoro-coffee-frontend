<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D4935A"/>
      <stop offset="100%" stop-color="#7B3F10"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%"   stop-color="#FFFBF6"/>
      <stop offset="100%" stop-color="#EDD9C0"/>
    </linearGradient>
    <linearGradient id="espressoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9B5028"/>
      <stop offset="100%" stop-color="#4A1E08"/>
    </linearGradient>
    <radialGradient id="latteArt" cx="42%" cy="40%" r="58%">
      <stop offset="0%"   stop-color="#F5DEB3"/>
      <stop offset="60%"  stop-color="#D28C40" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9B5028" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo latte gradient -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Saucer (pires) -->
  <ellipse cx="512" cy="730" rx="228" ry="22" fill="rgba(0,0,0,0.22)"/>
  <ellipse cx="512" cy="718" rx="228" ry="30" fill="#EDD9C0"/>
  <ellipse cx="512" cy="714" rx="200" ry="20" fill="#D4B896"/>
  <ellipse cx="512" cy="712" rx="150" ry="13" fill="#C8A882"/>

  <!-- Sombra da xícara -->
  <ellipse cx="515" cy="696" rx="186" ry="15" fill="rgba(0,0,0,0.18)"/>

  <!-- Corpo da xícara (trapézio com cantos arredondados embaixo) -->
  <path d="M 342,432 L 682,432
           L 660,680 Q 657,694 643,696
           L 381,696 Q 367,694 364,680 Z"
        fill="url(#cupGrad)"/>

  <!-- Borda superior da xícara -->
  <ellipse cx="512" cy="432" rx="170" ry="22" fill="#FFFBF8"/>

  <!-- Superfície do café (espresso escuro) -->
  <ellipse cx="512" cy="457" rx="153" ry="18" fill="url(#espressoGrad)"/>

  <!-- Latte art — brilho base -->
  <ellipse cx="502" cy="454" rx="96" ry="12" fill="url(#latteArt)"/>

  <!-- Latte art — anéis concêntricos (estilo rosetta) -->
  <ellipse cx="512" cy="455" rx="95" ry="10" fill="#F5DEB3" opacity="0.20"/>
  <ellipse cx="512" cy="455" rx="65" ry="7"  fill="#F5DEB3" opacity="0.38"/>
  <ellipse cx="512" cy="455" rx="38" ry="4"  fill="#F5DEB3" opacity="0.58"/>
  <circle  cx="512" cy="455" r="10"           fill="#F5DEB3" opacity="0.78"/>

  <!-- Alça (handle) -->
  <path d="M 676,490 Q 796,490 796,564 Q 796,638 676,638"
        fill="none" stroke="#EDD9C0" stroke-width="56" stroke-linecap="round"/>
  <path d="M 676,490 Q 796,490 796,564 Q 796,638 676,638"
        fill="none" stroke="#FFFBF6" stroke-width="34" stroke-linecap="round"/>

  <!-- Vapor (steam) -->
  <g fill="none" stroke-linecap="round" stroke-width="13"
     stroke="rgba(255,255,255,0.50)">
    <path d="M 452,376 C 440,348 464,320 452,292"/>
    <path d="M 512,364 C 500,336 524,308 512,280"/>
    <path d="M 572,376 C 560,348 584,320 572,292"/>
  </g>
</svg>
